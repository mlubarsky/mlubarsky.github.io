<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 40 40">
  <style>
    /* Default: dark */
    .bg     { fill: #0d0d14; }
    .ring   { stroke: rgba(124,111,247,0.35); }
    .letter { stroke: #7c6ff7; }

    @media (prefers-color-scheme: light) {
      .bg     { fill: #7c6ff7; }
      .ring   { stroke: rgba(255,255,255,0.20); }
      .letter { stroke: #ffffff; }
    }
  </style>

  <rect class="bg"   width="40" height="40" rx="8"/>
  <rect class="ring" width="40" height="40" rx="8" fill="none" stroke-width="1.25"/>

  <!-- M -->
  <polyline class="letter"
    points="5,30 5,11 13,21 21,11 21,30"
    fill="none" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- L -->
  <polyline class="letter"
    points="25,11 25,30 35,30"
    fill="none" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
